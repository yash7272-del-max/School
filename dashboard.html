<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="logo-area">

<img src="school-logo.png" class="logo">

<h2>School ERP</h2>

</div>

<div class="top-icons">

<span class="material-icons">notifications</span>

<span class="material-icons">account_circle</span>

</div>

</header>

<section class="welcome-card">

<h1 id="welcomeText">

Welcome Student

</h1>

<p>

Have a wonderful learning day.

</p>

</section>

<section class="profile-card">

<img

id="studentImage"

src="assets/images/yashprofile.png"

class="profile-photo">

<div>

<h2 id="studentName">

Loading...

</h2>

<p>

ID :
<span id="studentID"></span>

</p>

<p>

Class :
<span id="studentClass"></span>

</p>

<p>

Roll No :
<span id="studentRoll"></span>

</p>

</div>

</section>

<section class="dashboard-grid">

<div class="card">

<span class="material-icons">

fact_check

</span>

<h3>Attendance</h3>

<h2 id="attendance">

0%

</h2>

</div>

<div class="card">

<span class="material-icons">

payments

</span>

<h3>Fees</h3>

<h2 id="fees">

Loading

</h2>

</div>

<div class="card">

<span class="material-icons">

menu_book

</span>

<h3>Homework</h3>

<h2 id="homeworkCount">

0

</h2>

</div>

<div class="card">

<span class="material-icons">

quiz

</span>

<h3>Exams</h3>

<h2>

Upcoming

</h2>

</div>

</section>

<section class="notice-card">

<h2>

Latest Notice

</h2>

<p id="notice">

Loading...

</p>

</section>

<nav class="bottom-nav">

<a href="dashboard.html">

<span class="material-icons">

home

</span>

</a>

<a href="homework.html">

<span class="material-icons">

menu_book

</span>

</a>

<a href="attendance.html">

<span class="material-icons">

fact_check

</span>

</a>

<a href="profile.html">

<span class="material-icons">

person

</span>

</a>

<a href="settings.html">

<span class="material-icons">

settings

</span>

</a>

</nav>

<script src="js/database.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
