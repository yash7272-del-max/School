<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Profile</title>

<link rel="stylesheet"
href="css/profile.css">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="left">

<a href="dashboard.html">

<span class="material-icons">

arrow_back

</span>

</a>

<h2>

Student Profile

</h2>

</div>

</header>

<section class="profile-header">

<img
id="studentImage"
src="assets/images/yashprofile.png"
class="profile-photo">

<h2 id="studentName">

Loading...

</h2>

<p id="studentID">

Student ID

</p>

</section>

<section class="profile-details">

<div class="detail-card">

<h3>Academic Information</h3>

<p><strong>Class:</strong>
<span id="studentClass"></span></p>

<p><strong>Roll No:</strong>
<span id="studentRoll"></span></p>

<p><strong>Section:</strong>
<span id="studentSection"></span></p>

<p><strong>Attendance:</strong>
<span id="studentAttendance"></span></p>

<p><strong>Fees:</strong>
<span id="studentFees"></span></p>

</div>

<div class="detail-card">

<h3>Personal Information</h3>

<p><strong>Father:</strong>
<span id="fatherName"></span></p>

<p><strong>Mother:</strong>
<span id="motherName"></span></p>

<p><strong>Phone:</strong>
<span id="studentPhone"></span></p>

<p><strong>Email:</strong>
<span id="studentEmail"></span></p>

<p><strong>Blood Group:</strong>
<span id="bloodGroup"></span></p>

<p><strong>Date of Birth:</strong>
<span id="studentDOB"></span></p>

<p><strong>Address:</strong>
<span id="studentAddress"></span></p>

</div>

</section>
