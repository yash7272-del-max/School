<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance</title>

<link rel="stylesheet"
href="css/attendance.css">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="left">

<a href="dashboard.html">

<span class="material-icons">

arrow_back

</span>

</a>

<h2>

Attendance

</h2>

</div>

</header>

<section class="student-card">

<img
id="studentImage"
src="assets/images/profile-placeholder.png"
class="student-photo">

<div>

<h2 id="studentName">

Loading...

</h2>

<p>

Class :
<span id="studentClass">

Loading...

</span>

</p>

<p>

Roll No :
<span id="studentRoll">

Loading...

</span>

</p>

</div>

</section>

<section class="attendance-summary">

<div class="summary-card">

<h3>

Attendance

</h3>

<h1 id="attendancePercent">

0%

</h1>

</div>

<div class="summary-card">

<h3>

Present Days

</h3>

<h1 id="presentDays">

0

</h1>

</div>

<div class="summary-card">

<h3>

Absent Days

</h3>

<h1 id="absentDays">

0

</h1>

</div>

</section>

<section class="progress-section">

<h3>

Attendance Progress

</h3>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">

</div>

</div>

</section>

<section class="calendar-section">

<h2>

Monthly Attendance

</h2>

<div
id="attendanceCalendar"
class="calendar-grid">

<!-- Generated by attendance.js -->

</div>

</section>

<span class="material-icons">

home

</span>

</a>

</a>

fact_check

</span>

</a>

<a href="profile.html">

<span class="material-icons">

person

</span>

</a>

<a href="settings.html">

<span class="material-icons">

settings

</span>

</a>

</nav>

<script src="js/database.js"></script>

<script src="js/attendance.js"></script>

</body>

</html>
